<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO: Monitoreo de Red ITVER 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tecnm: { blue: '#003366', red: '#E63946', green: '#2A9D8F' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LineChart, Line, Cell, Legend } = Recharts;
        const { motion, AnimatePresence } = FramerMotion;

        // Icons from Lucide (Standalone way)
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const metricsData = [
            { name: 'Edificio A (UDIM)', availability: 99.77, error: 0.15, sat: 4.2 },
            { name: 'Edificio L (Lab. Química)', availability: 90.46, error: 5.05, sat: 2.9 },
            { name: 'Edificio X (Mecatrónica)', availability: 88.66, error: 7.15, sat: 2.8 },
            { name: 'Edificio W (Lab. Industrial)', availability: 97.06, error: 1.66, sat: 3.0 },
            { name: 'Edificio O (Biblioteca)', availability: 99.77, error: 0.20, sat: 4.5 },
            { name: 'Edificio U (Cómputo)', availability: 99.45, error: 0.30, sat: 4.1 },
            { name: 'Edificio N (Dirección)', availability: 99.79, error: 0.21, sat: 4.4 },
            { name: 'Edificio T (Lab. Eléctrica)', availability: 98.70, error: 0.86, sat: 3.9 },
        ];

        const hourlyData = [
            { h: '08:00', X: 94, L: 75, P: 55 },
            { h: '10:00', X: 110, L: 85, P: 60 },
            { h: '12:00', X: 159, L: 139, P: 91 },
            { h: '14:00', X: 161, L: 147, P: 93 },
            { h: '16:00', X: 89, L: 77, P: 51 },
            { h: '18:00', X: 93, L: 83, P: 54 },
        ];

        function App() {
            const [isPresenting, setIsPresenting] = useState(false);

            return (
                <div className={`min-h-screen transition-colors duration-500 ${isPresenting ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    {/* Header */}
                    {!isPresenting && (
                        <nav className="fixed top-0 w-full z-50 glass py-4 px-8 flex justify-between items-center shadow-sm">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 bg-tecnm-blue rounded-xl flex items-center justify-center text-white font-black">IT</div>
                                <span className="font-bold text-tecnm-blue tracking-tight text-xl">Red ITVER Portal</span>
                            </div>
                            <div className="flex items-center space-x-6">
                                <button onClick={() => setIsPresenting(true)} className="flex items-center gap-2 bg-tecnm-blue text-white px-5 py-2.5 rounded-full hover:scale-105 transition-transform font-semibold text-sm shadow-lg shadow-tecnm-blue/20">
                                    <Icon name="play" className="w-4 h-4" /> Modo Presentación
                                </button>
                            </div>
                        </nav>
                    )}

                    {/* Close Presentation Button */}
                    {isPresenting && (
                        <button onClick={() => setIsPresenting(false)} className="fixed top-8 right-8 z-[60] bg-white/10 hover:bg-white/20 p-3 rounded-full backdrop-blur-xl">
                            <Icon name="x" className="w-6 h-6 text-white" />
                        </button>
                    )}

                    {/* Hero Section */}
                    <section className="h-screen flex items-center justify-center relative overflow-hidden px-6">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-tecnm-blue/10 via-transparent to-transparent opacity-50"></div>
                        </div>
                        <motion.div initial={{opacity:0, y:30}} animate={{opacity:1, y:0}} className="relative z-10 text-center max-w-5xl">
                            <h1 className="text-6xl md:text-8xl font-black text-tecnm-blue mb-6 leading-tight">
                                Diagnóstico de Red <span className="text-tecnm-red">2026</span>
                            </h1>
                            <p className="text-xl md:text-2xl text-slate-600 mb-12 font-medium max-w-3xl mx-auto leading-relaxed">
                                Correlación entre métricas <span className="font-bold text-tecnm-blue underline decoration-tecnm-red/30">SNMP</span> y experiencia de usuario estudiantil en 12 edificios del ITVER.
                            </p>
                            <div className="flex flex-wrap justify-center gap-6">
                                <button className="px-10 py-5 bg-tecnm-blue text-white rounded-full font-bold text-lg shadow-2xl hover:-translate-y-1 transition-all">Explorar Dashboard</button>
                                <button className="px-10 py-5 border-2 border-tecnm-blue text-tecnm-blue rounded-full font-bold text-lg hover:bg-tecnm-blue hover:text-white transition-all">Reporte Técnico</button>
                            </div>
                        </motion.div>
                    </section>

                    {/* Dashboard */}
                    <section className="py-24 px-8 max-w-7xl mx-auto">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl font-extrabold text-tecnm-blue mb-4">Análisis de Disponibilidad</h2>
                            <div className="w-24 h-2 bg-tecnm-red mx-auto rounded-full"></div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                            <div className="glass p-8 rounded-[2rem] shadow-xl">
                                <h3 className="text-xl font-bold mb-8 flex items-center gap-2"><Icon name="bar-chart-3" className="text-tecnm-red" /> Disponibilidad (%)</h3>
                                <div className="h-[350px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={metricsData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} opacity={0.1} />
                                            <XAxis dataKey="name" fontSize={12} tickLine={false} axisLine={false} />
                                            <YAxis domain={[80, 100]} fontSize={12} tickLine={false} axisLine={false} />
                                            <Tooltip cursor={{fill: '#f1f5f9'}} contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 20px 25px -5px rgb(0 0 0 / 0.1)'}} />
                                            <Bar dataKey="availability" radius={[8, 8, 0, 0]}>
                                                {metricsData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={entry.availability < 92 ? '#E63946' : entry.availability < 96 ? '#F59E0B' : '#2A9D8F'} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            <div className="glass p-8 rounded-[2rem] shadow-xl">
                                <h3 className="text-xl font-bold mb-8 flex items-center gap-2"><Icon name="activity" className="text-tecnm-blue" /> Tráfico (Mbps) por Hora</h3>
                                <div className="h-[350px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={hourlyData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} opacity={0.1} />
                                            <XAxis dataKey="h" fontSize={12} tickLine={false} axisLine={false} />
                                            <YAxis fontSize={12} tickLine={false} axisLine={false} />
                                            <Tooltip contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 20px 25px -5px rgb(0 0 0 / 0.1)'}} />
                                            <Line type="monotone" dataKey="X" name="Edificio X" stroke="#E63946" strokeWidth={4} dot={{r: 6, fill: '#E63946', strokeWidth: 3, stroke: '#fff'}} />
                                            <Line type="monotone" dataKey="L" name="Edificio L" stroke="#F59E0B" strokeWidth={4} dot={{r: 6, fill: '#F59E0B', strokeWidth: 3, stroke: '#fff'}} />
                                            <Line type="monotone" dataKey="P" name="Promedio" stroke="#2A9D8F" strokeWidth={2} strokeDasharray="5 5" />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        {/* KPI Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-12">
                            <div className="glass p-8 rounded-3xl flex items-center gap-6 border-l-8 border-tecnm-red">
                                <div className="p-4 bg-tecnm-red/10 rounded-2xl"><Icon name="alert-triangle" className="w-8 h-8 text-tecnm-red" /></div>
                                <div><p className="text-sm font-bold text-slate-500 uppercase tracking-widest">Edificios Críticos</p><h4 className="text-3xl font-black">Edificio X, L</h4></div>
                            </div>
                            <div className="glass p-8 rounded-3xl flex items-center gap-6 border-l-8 border-amber-500">
                                <div className="p-4 bg-amber-500/10 rounded-2xl"><Icon name="clock" className="w-8 h-8 text-amber-500" /></div>
                                <div><p className="text-sm font-bold text-slate-500 uppercase tracking-widest">Hora Pico</p><h4 className="text-3xl font-black">11:00 - 15:00</h4></div>
                            </div>
                            <div className="glass p-8 rounded-3xl flex items-center gap-6 border-l-8 border-tecnm-green">
                                <div className="p-4 bg-tecnm-green/10 rounded-2xl"><Icon name="users" className="w-8 h-8 text-tecnm-green" /></div>
                                <div><p className="text-sm font-bold text-slate-500 uppercase tracking-widest">Muestra</p><h4 className="text-3xl font-black">371 Alumnos</h4></div>
                            </div>
                        </div>
                    </section>

                    {/* Matriz */}
                    <section className="py-24 bg-tecnm-blue text-white overflow-hidden relative">
                         <div className="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none">
                            <div className="grid grid-cols-10 gap-10 p-20">
                                {[...Array(100)].map((_, i) => <div key={i} className="w-2 h-2 bg-white rounded-full"></div>)}
                            </div>
                         </div>
                         <div className="max-w-7xl mx-auto px-8 relative z-10">
                            <h2 className="text-4xl font-black mb-16 text-center">Matriz de Correlación</h2>
                            <div className="overflow-hidden rounded-3xl border border-white/20 bg-white/5 backdrop-blur-sm shadow-2xl">
                                <table className="w-full text-left">
                                    <thead className="bg-white/10 text-xs font-black uppercase tracking-widest text-slate-300">
                                        <tr>
                                            <th className="p-6">Edificio</th>
                                            <th className="p-6">Disponibilidad</th>
                                            <th className="p-6">Tasa Error</th>
                                            <th className="p-6">Diagnóstico</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/10">
                                        {metricsData.slice(0, 5).map((m, i) => (
                                            <tr key={i} className="hover:bg-white/5 transition-colors">
                                                <td className="p-6 font-bold text-lg">{m.name}</td>
                                                <td className="p-6">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-32 h-2 bg-white/10 rounded-full overflow-hidden">
                                                            <div className={`h-full ${m.availability < 92 ? 'bg-tecnm-red' : 'bg-tecnm-green'}`} style={{width: `${m.availability}%`}}></div>
                                                        </div>
                                                        <span className="font-mono text-sm">{m.availability}%</span>
                                                    </div>
                                                </td>
                                                <td className="p-6 font-mono text-sm">{m.error} avg/h</td>
                                                <td className="p-6">
                                                    <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter ${m.availability < 92 ? 'bg-tecnm-red text-white' : 'bg-tecnm-green text-white'}`}>
                                                        {m.availability < 92 ? 'Critical Fall' : 'Normal'}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                         </div>
                    </section>

                    {/* Mapa */}
                    <section className="py-24 px-8 max-w-7xl mx-auto">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-16 items-center">
                            <div className="lg:col-span-2 relative">
                                <div className="absolute -top-10 -left-10 w-40 h-40 bg-tecnm-red/5 rounded-full blur-3xl"></div>
                                <div className="glass p-1 rounded-[3rem] shadow-2xl bg-white relative overflow-hidden">
                                    <svg viewBox="0 0 600 400" className="w-full h-auto">
                                        <rect x="50" y="50" width="120" height="100" fill="#E63946" rx="15" className="opacity-80 hover:opacity-100 cursor-pointer transition-opacity" />
                                        <text x="110" y="105" textAnchor="middle" fill="white" className="font-bold text-xs">EDIFICIO X</text>
                                        <rect x="200" y="40" width="100" height="120" fill="#E63946" rx="15" className="opacity-80 hover:opacity-100 cursor-pointer" />
                                        <text x="250" y="105" textAnchor="middle" fill="white" className="font-bold text-xs">EDIFICIO L</text>
                                        <rect x="350" y="80" width="150" height="100" fill="#2A9D8F" rx="15" className="opacity-80 hover:opacity-100 cursor-pointer" />
                                        <text x="425" y="135" textAnchor="middle" fill="white" className="font-bold text-xs">BIBLIOTECA (EDIF. O)</text>
                                        <rect x="150" y="220" width="300" height="120" fill="#2A9D8F" rx="15" className="opacity-80 hover:opacity-100 cursor-pointer" />
                                        <text x="300" y="285" textAnchor="middle" fill="white" className="font-bold text-xs">ADMINISTRACIÓN (EDIF. N)</text>
                                        <path d="M 110,105 L 250,105 L 425,135 L 300,285 Z" fill="none" stroke="#003366" strokeWidth="2" strokeDasharray="8 8" opacity="0.2" />
                                    </svg>
                                </div>
                            </div>
                            <div className="space-y-8">
                                <h2 className="text-4xl font-black text-tecnm-blue">Mapa de Calor ITVER</h2>
                                <p className="text-slate-600 leading-relaxed">Visualización espacial de la infraestructura. Los edificios en <span className="font-bold text-tecnm-red">Rojo</span> presentan fallas críticas de interconectividad por topología obsoleta.</p>
                                <div className="space-y-4">
                                    <div className="flex items-center gap-4 p-4 glass rounded-2xl"><div className="w-4 h-4 bg-tecnm-red rounded"></div><span className="font-bold text-sm">Crítico (&lt; 92%)</span></div>
                                    <div className="flex items-center gap-4 p-4 glass rounded-2xl"><div className="w-4 h-4 bg-tecnm-green rounded"></div><span className="font-bold text-sm">Óptimo (&gt; 96%)</span></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-slate-900 text-slate-500 text-center border-t border-white/5">
                        <p className="font-bold uppercase tracking-widest text-xs">© 2026 Instituto Tecnológico de Veracruz | Taller de Investigación II</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
